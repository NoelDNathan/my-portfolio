<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sancho-mini · Run in browser</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c9a227;
    }
    * { box-sizing: border-box; }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 1.5rem;
      min-height: 100vh;
    }
    .container { max-width: 42rem; margin: 0 auto; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .subtitle { color: var(--muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .panel {
      background: var(--surface);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--text);
      padding: 0.75rem;
      font-family: inherit;
      font-size: 0.9rem;
      resize: vertical;
    }
    textarea:focus { outline: none; border-color: var(--accent); }
    .label { display: block; font-size: 0.875rem; color: var(--muted); margin-bottom: 0.5rem; }
    .input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
    }
    .input:focus { outline: none; border-color: var(--accent); }
    .controls { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
    button {
      background: var(--accent);
      color: #0f0f0f;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button:hover { filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { font-size: 0.8rem; color: var(--muted); }
    .error { color: #e55; }
    .back { margin-bottom: 1rem; }
    .back a { color: var(--muted); text-decoration: none; font-size: 0.875rem; }
    .back a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="back"><a href="/">← Back to portfolio</a></div>
    <h1>Sancho-mini</h1>
    <p class="subtitle">Character-level GPT inference in the browser (ONNX). Place <code>sancho-mini.onnx</code> and <code>vocab.json</code> in this folder.</p>

    <div class="panel">
      <label for="prompt" class="label">Optional starting text (leave empty for default)</label>
      <input type="text" id="prompt" class="input" placeholder="e.g. <|startofpoem|> or your own beginning…" />
      <div class="controls">
        <button type="button" id="btn-run">Generate poem</button>
        <button type="button" id="btn-stop" disabled>Stop</button>
        <span class="status" id="status">Load model and vocab to start.</span>
      </div>
      <textarea id="output" readonly placeholder="Generated text will appear here…"></textarea>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
